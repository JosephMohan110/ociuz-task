{% extends 'student/base.html' %}

{% block content %}
<div class="form-container" style="max-width: 600px; margin: 0 auto; background: white; padding: 28px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);">
    
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px; border-bottom: 2px solid #f1f5f9; padding-bottom: 12px;">
        <span style="font-size: 26px;">✈️</span>
        <h2 style="color: #0f172a; margin: 0;">Submit New Leave Request</h2>
    </div>

    <!-- The actual submission form -->
    <form method="POST" action="{% url 'add_leave_request' %}">
        {% csrf_token %}

        <div style="margin-bottom: 16px;">
            <label style="display: block; font-weight: 600; color: #334155; margin-bottom: 6px;">Employee Name</label>
            <input type="text" name="employee_name" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px;">
        </div>

        <div style="margin-bottom: 16px;">
            <label style="display: block; font-weight: 600; color: #334155; margin-bottom: 6px;">Leave Type</label>
            <select name="leave_type" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; background-color: white;">
                <option value="" disabled selected>-- Select Leave Type --</option>
                <option value="Casual Leave">Casual Leave</option>
                <option value="Medical Leave">Medical Leave</option>
                <option value="Earned Leave">Earned Leave</option>
                <option value="Maternity Leave">Maternity Leave</option>
            </select>
        </div>

        <div style="display: flex; gap: 16px; margin-bottom: 16px;">
            <div style="flex: 1;">
                <label style="display: block; font-weight: 600; color: #334155; margin-bottom: 6px;">Start Date</label>
                <input type="date" name="start_date" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px;">
            </div>
            <div style="flex: 1;">
                <label style="display: block; font-weight: 600; color: #334155; margin-bottom: 6px;">End Date</label>
                <input type="date" name="end_date" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px;">
            </div>
        </div>

        <div style="margin-bottom: 24px;">
            <label style="display: block; font-weight: 600; color: #334155; margin-bottom: 6px;">Reason for Leave</label>
            <textarea name="reason" rows="4" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; resize: vertical;"></textarea>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 12px; border-top: 1px solid #e2e8f0; padding-top: 16px;">
            <a href="{% url 'add_leave' %}" style="padding: 10px 18px; border: 1px solid #cbd5e1; border-radius: 6px; color: #475569; text-decoration: none; font-size: 14px; font-weight: 500;">Cancel</a>
            <button type="submit" style="padding: 10px 20px; background: #22c55e; border: none; border-radius: 6px; color: white; font-size: 14px; font-weight: 600; cursor: pointer;">Submit Request</button>
        </div>
    </form>
</div>
{% endblock %}
