{% comment %}
 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP System - Login</title>
    <style>
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: radial-gradient(1200px circle at 20% 0%, #e9f3ff 0%, rgba(233,243,255,0) 55%),
                        radial-gradient(900px circle at 90% 10%, #eafbeF 0%, rgba(234,251,239,0) 50%),
                        #f6f8fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #0f172a;
        }
        
        .form-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            padding: 35px;
            border-radius: 16px;
            border: 1px solid rgba(229, 231, 235, 0.9);
            box-shadow: 0 18px 50px rgba(2, 6, 23, 0.08);
            backdrop-filter: blur(6px);
        }

        .text-center { text-align: center; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        .form-input {
            width: 100%; padding: 12px; border: 1px solid #dbe3f1;
            border-radius: 8px; outline: none; background: rgba(255,255,255,0.9);
            box-shadow: 0 2px 8px rgba(2, 6, 23, 0.03); transition: 0.2s;
            box-sizing: border-box;
        }
        .form-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        
        .btn-primary {
            display: inline-flex; justify-content: center; width: 100%;
            padding: 12px; border: none; border-radius: 10px; cursor: pointer;
            font-size: 15px; font-weight: 600; background: #007bff; color: white;
            transition: transform 120ms ease, box-shadow 120ms ease;
            box-shadow: 0 6px 16px rgba(2, 6, 23, 0.1);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 22px rgba(2, 6, 23, 0.15); }
        
        .alert { padding: 12px; margin-bottom: 15px; border-radius: 6px; font-size: 14px; text-align: center; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-info { background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2 class="text-center" style="margin-bottom: 10px;">ERP Login</h2>
        <p class="text-center" style="color: #64748b; margin-bottom: 24px; font-size: 14px;">Student Management System</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}error{% else %}info{% endif %}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-input" required autocomplete="off" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-input" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">Secure Login</button>
        </form>
    </div>
</body>
</html> 
{% endcomment %}
